<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Redes de Mi Estrella ✨</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: gray;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 30px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        .instagram {
            background: #E1306C;
        }

        .tiktok {
            background: #000000;
        }

        .youtube {
            background: #FF0000;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✨ Sígueme ✨</h1>
        <p>Encuentra mi contenido aquí 💖</p>

        <a href="https://instagram.com/TU_USUARIO" target="_blank" class="btn instagram">
            Instagram
        </a>

        <a href="https://tiktok.com/@TU_USUARIO" target="_blank" class="btn tiktok">
            TikTok
        </a>

        <a href="https://youtube.com/TU_CANAL" target="_blank" class="btn youtube">
            YouTube
        </a>
    </div>
</body>
</html>
