<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nao Méndez | Link en Bio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            /* Fondo degradado aesthetic rosa pastel */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden; /* Evita que las decoraciones creen barras de desplazamiento */
            position: relative;
        }

        /* Corazones y estrellas flotantes de fondo */
        .decor-item {
            position: fixed;
            color: rgba(238, 156, 167, 0.4); /* Subtle pink, semi-transparent */
            opacity: 0;
            pointer-events: none; /* Asegura que no se puedan hacer clic */
            filter: blur(1px); /* Suaviza los iconos */
            animation: floatGlitter 20s linear infinite;
            z-index: -1; /* Los coloca detrás del contenedor central */
        }

        /* Posiciones y tiempos individuales para cada decoración */
        .decor-1 { top: 15%; left: 10%; font-size: 24px; animation-delay: 0s; }
        .decor-2 { bottom: 25%; right: 15%; font-size: 28px; animation-delay: 7s; }
        .decor-3 { top: 60%; left: 5%; font-size: 20px; animation-delay: 14s; }

        @keyframes floatGlitter {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translate(30px, -100px) rotate(10deg); }
            90% { opacity: 0.8; }
            100% { transform: translate(0, -200px) rotate(-10deg); opacity: 0; }
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            max-width: 400px;
            width: 100%;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            position: relative; /* Para posicionar elementos dentro */
        }

        .profile-container {
            margin-bottom: 25px;
            position: relative; /* Contexto para la estrella flotante interna */
        }

        /* Pequeña estrella flotante interna cerca del perfil */
        .profile-container::after {
            content: "✨";
            position: absolute;
            top: 50px; /* Ajusta la posición vertical */
            right: -10px;
            font-size: 18px;
            color: rgba(238, 156, 167, 0.7);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(238, 156, 167, 0.4);
            margin-bottom: 15px;
        }

        h1 {
            color: #4a4a4a;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(238, 156, 167, 0.3); /* Sombra suave para elegancia */
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            color: #555;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid #ffeef0;
        }

        .link-btn img {
            width: 24px;
            height: 24px;
            position: absolute;
            left: 20px;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            color: #fff;
            box-shadow: 0 8px 20px rgba(238, 156, 167, 0.4);
            border-color: transparent;
        }

        /* Cambiar el brillo del icono en hover si es necesario para que contraste con el texto blanco */
        .link-btn:hover img {
            filter: brightness(0) invert(1);
        }
    </style>
</head>
<body>

    <span class="decor-item decor-1">✨</span>
    <span class="decor-item decor-2">💖</span>
    <span class="decor-item decor-3">🌟</span>

    <div class="container">
        <header class="profile-container">
            <img src="profile.png" alt="Nao Méndez" class="profile-pic" onerror="this.src='https://via.placeholder.com/120x120/ffeef0/ee9ca7?text=Nao'">
            
            <h1>Nao Méndez</h1>
            <p class="subtitle">Moda &bull; Belleza &bull; Maquillaje</p>
        </header>

        <nav class="links-container">
            <a href="https://www.instagram.com/justnaomdz?igsh=amswdmg5anhmdmth" class="link-btn" target="_blank">
                <img src="instagram.png" alt="Instagram" onerror="this.src='https://via.placeholder.com/24x24/cccccc/ffffff?text=IG'">
                Instagram
            </a>

            <a href="https://www.tiktok.com/@nao.mendez1?_r=1&_t=ZS-94JhesT2L0q" class="link-btn" target="_blank">
                <img src="tiktok.png" alt="TikTok" onerror="this.src='https://via.placeholder.com/24x24/cccccc/ffffff?text=TK'">
                TikTok
            </a>

            <a href="https://youtube.com/@naomendez?si=h9tR0g1IjBX0o_T7" class="link-btn" target="_blank">
                <img src="youtube.png" alt="YouTube" onerror="this.src='https://via.placeholder.com/24x24/cccccc/ffffff?text=YT'">
                YouTube
            </a>
        </nav>
    </div>

</body>
</html>
